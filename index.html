<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6c63ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Adivinhe o Número</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100dvh;
      background: linear-gradient(135deg, #6c63ff 0%, #3f3d9c 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      padding: 20px;
    }

    h1 {
      color: white;
      font-size: 1.6rem;
      margin-bottom: 24px;
      text-align: center;
      letter-spacing: 0.5px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 32px 24px 24px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .range-hint {
      text-align: center;
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    .win-banner {
      display: none;
      text-align: center;
      margin-bottom: 12px;
    }

    .win-banner.show {
      display: block;
    }

    .trophy {
      font-size: 3rem;
      animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: inline-block;
    }

    @keyframes pop {
      from { transform: scale(0); }
      to   { transform: scale(1); }
    }

    .number-selector {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 24px;
    }

    .adj-btn {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      border: none;
      font-size: 2.2rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.08s, box-shadow 0.08s;
      user-select: none;
      -webkit-user-select: none;
      line-height: 1;
      touch-action: none;
    }

    .adj-btn:active {
      transform: scale(0.90);
    }

    .btn-minus {
      background: #ffe5e5;
      color: #e53935;
      box-shadow: 0 4px 12px rgba(229, 57, 53, 0.2);
    }

    .btn-plus {
      background: #e8f5e9;
      color: #43a047;
      box-shadow: 0 4px 12px rgba(67, 160, 71, 0.2);
    }

    .number-display {
      font-size: 4.5rem;
      font-weight: 800;
      color: #222;
      min-width: 110px;
      text-align: center;
      line-height: 1;
      letter-spacing: -2px;
    }

    .guess-btn {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #6c63ff, #3f3d9c);
      color: white;
      font-size: 1.15rem;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 16px;
      transition: transform 0.1s, opacity 0.1s;
      letter-spacing: 0.5px;
      box-shadow: 0 6px 20px rgba(108, 99, 255, 0.4);
    }

    .guess-btn:active {
      transform: scale(0.97);
    }

    .guess-btn:disabled {
      opacity: 0.45;
      cursor: default;
      box-shadow: none;
    }

    .feedback {
      min-height: 62px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 20px;
      font-size: 1rem;
      font-weight: 600;
      text-align: center;
      transition: background 0.3s, color 0.3s;
    }

    .feedback.empty   { background: #f5f5f5; color: #bbb; }
    .feedback.higher  { background: #fff3e0; color: #e65100; }
    .feedback.lower   { background: #e3f2fd; color: #0277bd; }
    .feedback.win     { background: #e8f5e9; color: #2e7d32; }

    .stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .attempts-label {
      color: #999;
      font-size: 0.85rem;
    }

    .attempts-label strong {
      color: #444;
    }

    .new-game-btn {
      background: none;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 0.85rem;
      color: #666;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .new-game-btn:active {
      background: #f5f5f5;
    }
  </style>
</head>
<body>

  <h1>🔢 Adivinhe o Número</h1>

  <div class="card">
    <p class="range-hint">Pensei em um número entre <strong>1</strong> e <strong>100</strong></p>

    <div class="win-banner" id="winBanner">
      <div class="trophy">🏆</div>
    </div>

    <div class="number-selector">
      <button class="adj-btn btn-minus" id="btnMinus" aria-label="Diminuir">−</button>
      <div class="number-display" id="numDisplay" aria-live="polite">50</div>
      <button class="adj-btn btn-plus"  id="btnPlus"  aria-label="Aumentar">+</button>
    </div>

    <button class="guess-btn" id="guessBtn">Chutar!</button>

    <div class="feedback empty" id="feedback" aria-live="assertive">
      Tente adivinhar o número!
    </div>

    <div class="stats">
      <p class="attempts-label">Tentativas: <strong id="attemptsCount">0</strong></p>
      <button class="new-game-btn" id="newGameBtn">Novo Jogo</button>
    </div>
  </div>

  <script>
    let secret   = rand();
    let current  = 50;
    let attempts = 0;
    let won      = false;

    const numDisplay    = document.getElementById('numDisplay');
    const feedback      = document.getElementById('feedback');
    const attemptsCount = document.getElementById('attemptsCount');
    const winBanner     = document.getElementById('winBanner');
    const guessBtn      = document.getElementById('guessBtn');

    function rand() {
      return Math.floor(Math.random() * 100) + 1;
    }

    function updateDisplay() {
      numDisplay.textContent = current;
    }

    function clamp(n) {
      return Math.min(100, Math.max(1, n));
    }

    /* Hold-to-repeat logic */
    function makeHoldButton(btn, delta) {
      let timer    = null;
      let interval = null;

      function tick() {
        if (won) return;
        current = clamp(current + delta);
        updateDisplay();
      }

      function start(e) {
        e.preventDefault();
        tick();
        timer = setTimeout(() => {
          interval = setInterval(tick, 80);
        }, 350);
      }

      function stop() {
        clearTimeout(timer);
        clearInterval(interval);
      }

      btn.addEventListener('mousedown',   start);
      btn.addEventListener('touchstart',  start, { passive: false });
      btn.addEventListener('mouseup',     stop);
      btn.addEventListener('mouseleave',  stop);
      btn.addEventListener('touchend',    stop);
      btn.addEventListener('touchcancel', stop);
    }

    makeHoldButton(document.getElementById('btnMinus'), -1);
    makeHoldButton(document.getElementById('btnPlus'),  +1);

    guessBtn.addEventListener('click', () => {
      if (won) return;

      attempts++;
      attemptsCount.textContent = attempts;

      if (current === secret) {
        feedback.className   = 'feedback win';
        feedback.textContent = `Parabéns! Você acertou em ${attempts} tentativa${attempts !== 1 ? 's' : ''}! 🎉`;
        winBanner.classList.add('show');
        guessBtn.disabled = true;
        won = true;
      } else if (current < secret) {
        feedback.className   = 'feedback higher';
        feedback.textContent = '📈 O número é MAIOR!';
      } else {
        feedback.className   = 'feedback lower';
        feedback.textContent = '📉 O número é MENOR!';
      }
    });

    document.getElementById('newGameBtn').addEventListener('click', () => {
      secret   = rand();
      current  = 50;
      attempts = 0;
      won      = false;

      updateDisplay();
      feedback.className   = 'feedback empty';
      feedback.textContent = 'Tente adivinhar o número!';
      attemptsCount.textContent = '0';
      winBanner.classList.remove('show');
      guessBtn.disabled = false;
    });
  </script>
</body>
</html>
